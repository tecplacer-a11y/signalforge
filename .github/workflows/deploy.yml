name: Build & Deploy SignalForge

# Builds the Docker image, pushes it to ECR, and deploys to AWS.
# Auth uses GitHub OIDC (no long-lived AWS keys stored in GitHub).
#
# Required repo settings:
#   Variables (Settings → Secrets and variables → Actions → Variables):
#     AWS_REGION         e.g. us-east-1
#     AWS_ACCOUNT_ID     e.g. 123456789012
#     ECR_REPOSITORY     e.g. signalforge
#     DEPLOY_TARGET      "ecs" or "apprunner"
#     ECS_CLUSTER        (ecs only) e.g. signalforge
#     ECS_SERVICE        (ecs only) e.g. signalforge
#     APPRUNNER_SERVICE_ARN  (apprunner only) the service ARN
#   Secrets:
#     AWS_DEPLOY_ROLE_ARN   ARN of the OIDC deploy role (see iam/github-oidc-deploy-role.json)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  # ── 1. Continuous integration: typecheck + build on every push/PR ──
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc
      - name: Build
        run: npm run build

  # ── 2. Build image, push to ECR, deploy (main branch only) ──
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          LATEST="$REGISTRY/$ECR_REPOSITORY:latest"
          docker build --platform linux/amd64 -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # ── Deploy: ECS path ──
      - name: Deploy to ECS
        if: vars.DEPLOY_TARGET == 'ecs'
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment \
            --region "$AWS_REGION" >/dev/null
          echo "Triggered ECS rolling deployment on ${{ vars.ECS_SERVICE }}."
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}" \
            --region "$AWS_REGION"
          echo "ECS service is stable."

      # ── Deploy: App Runner path ──
      - name: Deploy to App Runner
        if: vars.DEPLOY_TARGET == 'apprunner'
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --region "$AWS_REGION" >/dev/null
          echo "Triggered App Runner deployment."

      - name: Summary
        run: echo "Deployed image ${{ steps.build.outputs.image }} to ${{ vars.DEPLOY_TARGET }}."
