# Phase 2.6 — automated dependency scanning.
# Dependabot opens PRs for vulnerable or outdated dependencies; CI
# (typecheck + build) runs on every PR, so updates are pre-validated.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
