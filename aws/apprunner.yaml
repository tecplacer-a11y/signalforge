# AWS App Runner service config (simplest container path).
# App Runner builds/pulls the image from ECR, runs it, gives you HTTPS + autoscaling.
# Set DATABASE_URL and provider secrets in the App Runner console (or via the
# create-service CLI in aws/deploy.sh). Health check path: /healthz.
#
# This file documents the runtime contract; App Runner itself is created via
# `aws apprunner create-service` (see aws/deploy.sh) or the console using:
#   - Source: ECR image  <account>.dkr.ecr.<region>.amazonaws.com/signalforge:latest
#   - Port: 5000
#   - Health check: HTTP GET /healthz
#   - Env vars: NODE_ENV=production, PORT=5000, DATABASE_URL=<rds-url>, + secrets
#   - CPU/Memory: 1 vCPU / 2 GB (good starting point)

version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci
      - npm run build
run:
  runtime-version: 20
  command: node dist/index.cjs
  network:
    port: 5000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
